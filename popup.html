<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RealReal Enhancer</title>
  <style>
    :root { --bg: #111; --surface: #1a1a1a; --surface2: #222; --border: #2a2a2a; --text: #f0f0f0; --text2: #aaa; --text3: #666; --gold: #c8a97e; --gold-dim: rgba(200,169,126,0.12); --green: #27ae60; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; -webkit-font-smoothing: antialiased; }

    .header { padding: 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; flex: 1; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
    .status-dot.on { background: var(--green); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
    .qs { padding: 14px 8px; text-align: center; border-right: 1px solid var(--border); }
    .qs:last-child { border-right: none; }
    .qs-num { font-size: 20px; font-weight: 700; }
    .qs-num.gold { color: var(--gold); }
    .qs-num.green { color: var(--green); }
    .qs-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .actions { padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .action-btn { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: inherit; font-family: inherit; font-size: 13px; width: 100%; text-align: left; }
    .action-btn:hover { background: var(--surface2); border-color: var(--gold); }
    .action-icon { font-size: 18px; }
    .action-info { flex: 1; }
    .action-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .action-desc { font-size: 10px; color: var(--text3); }
    .action-arrow { color: var(--text3); font-size: 14px; }

    .presets-section { padding: 0 12px 12px; }
    .presets-title { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-top: 4px; }
    .presets-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .preset-pill { display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.15s; text-decoration: none; font-family: inherit; }
    .preset-pill:hover { border-color: var(--gold); color: var(--text); }
    .no-presets { font-size: 11px; color: var(--text3); font-style: italic; padding: 4px 0; }

    .settings-strip { display: flex; padding: 10px 12px; gap: 12px; border-top: 1px solid var(--border); background: var(--surface); }
    .ss-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    .ss-toggle input { display: none; }
    .ss-slider { position: relative; width: 28px; height: 16px; background: #444; border-radius: 8px; transition: background 0.2s; }
    .ss-slider::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #999; border-radius: 50%; transition: all 0.2s; }
    .ss-toggle input:checked + .ss-slider { background: var(--gold); }
    .ss-toggle input:checked + .ss-slider::after { left: 14px; background: #fff; }
    .ss-label { font-size: 10px; color: var(--text3); }
    .ss-toggle input:checked ~ .ss-label { color: var(--gold); }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:16px">⚡</span>
    <h1>RealReal Enhancer</h1>
    <span class="status-dot" id="status-dot"></span>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="actions">
    <button class="action-btn" id="open-sidepanel">
      <span class="action-icon">🎵</span>
      <div class="action-info"><div class="action-name">Side Panel</div><div class="action-desc">Items + music while you browse</div></div>
      <span class="action-arrow">→</span>
    </button>
    <button class="action-btn" id="open-dashboard">
      <span class="action-icon">📊</span>
      <div class="action-info"><div class="action-name">Dashboard</div><div class="action-desc">Full view of all your items and stats</div></div>
      <span class="action-arrow">→</span>
    </button>
  </div>
  <div class="presets-section">
    <div class="presets-title">Quick Apply Preset</div>
    <div class="presets-pills" id="presets-pills"></div>
  </div>
  <div class="settings-strip">
    <label class="ss-toggle"><input type="checkbox" id="s-compact"><span class="ss-slider"></span><span class="ss-label">Compact</span></label>
    <label class="ss-toggle"><input type="checkbox" id="s-dim"><span class="ss-slider"></span><span class="ss-label">Dim Sold</span></label>
  </div>
  <script>
    function parsePrice(s) { if (!s) return 0; const m = String(s).replace(/,/g,'').match(/[\d.]+/); return m ? parseFloat(m[0]) : 0; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
    function notify() { chrome.runtime.sendMessage({ type: 'REFRESH_CONTENT' }).catch(()=>{}); }

    document.addEventListener('DOMContentLoaded', async () => {
      const sync = await chrome.storage.sync.get(['presets', 'settings']);
      const local = await chrome.storage.local.get(['savedItems']);
      const presets = sync.presets || [];
      const settings = sync.settings || {};
      const savedItems = local.savedItems || {};

      chrome.tabs.query({ active: true, currentWindow: true }, tabs => {
        document.getElementById('status-dot').classList.toggle('on', tabs[0]?.url?.includes('therealreal.com'));
      });

      const keys = Object.keys(savedItems);
      const drops = keys.filter(k => { const i = savedItems[k]; return parsePrice(i.originalPrice) > 0 && parsePrice(i.currentPrice) > 0 && parsePrice(i.currentPrice) < parsePrice(i.originalPrice); }).length;
      document.getElementById('stats-row').innerHTML = `
        <div class="qs"><div class="qs-num gold">${keys.length}</div><div class="qs-label">Items</div></div>
        <div class="qs"><div class="qs-num${drops ? ' green' : ''}">${drops}</div><div class="qs-label">Drops</div></div>
        <div class="qs"><div class="qs-num">${presets.length}</div><div class="qs-label">Presets</div></div>`;

      const pills = document.getElementById('presets-pills');
      if (presets.length) {
        pills.innerHTML = presets.map(p => `<button class="preset-pill" data-search="${esc(p.search||'')}" data-hash="${esc(p.hash||'')}" data-url="${esc(p.fullUrl||'')}">${esc(p.emoji||'🔖')} ${esc(p.name)}</button>`).join('');
        pills.querySelectorAll('.preset-pill').forEach(el => el.addEventListener('click', () => {
          chrome.tabs.query({ active: true, currentWindow: true }, tabs => {
            if (!tabs[0]) return;
            const u = new URL(tabs[0].url);
            const noF = ['/account','/cart','/checkout','/login','/signup','/settings','/orders','/help'];
            const ok = u.pathname !== '/' && !noF.some(p => u.pathname.startsWith(p));
            const url = (ok && (el.dataset.search||el.dataset.hash)) ? u.origin + u.pathname + el.dataset.search + el.dataset.hash : el.dataset.url;
            chrome.tabs.update(tabs[0].id, { url }); window.close();
          });
        }));
      } else { pills.innerHTML = '<span class="no-presets">Save filters from the toolbar on TRR</span>'; }

      const compact = document.getElementById('s-compact'), dim = document.getElementById('s-dim');
      compact.checked = settings.compactView || false;
      dim.checked = settings.dimSold !== undefined ? settings.dimSold : true;
      compact.addEventListener('change', async () => { settings.compactView = compact.checked; await chrome.storage.sync.set({ settings }); notify(); });
      dim.addEventListener('change', async () => { settings.dimSold = dim.checked; await chrome.storage.sync.set({ settings }); notify(); });

      document.getElementById('open-dashboard').addEventListener('click', () => { chrome.tabs.create({ url: chrome.runtime.getURL('dashboard.html') }); window.close(); });
      document.getElementById('open-sidepanel').addEventListener('click', async () => {
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        if (tab) { try { await chrome.sidePanel.open({ tabId: tab.id }); } catch(e) { chrome.tabs.create({ url: chrome.runtime.getURL('sidepanel.html') }); } }
        window.close();
      });
    });
  </script>
</body>
</html>
