<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RealReal Enhancer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; max-height: 560px; background: #1a1a1a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; -webkit-font-smoothing: antialiased; overflow-y: auto; }

    .header { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 13px; font-weight: 600; color: #c8a97e; letter-spacing: 1px; text-transform: uppercase; }
    .header .v { margin-left: auto; font-size: 10px; color: #555; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid #2a2a2a; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: #aaa; }
    .tab.active { color: #c8a97e; border-color: #c8a97e; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; }
    .section-title { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* Preset list */
    .preset-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; margin-bottom: 3px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .preset-item:hover { background: #2a2a2a; }
    .p-emoji { font-size: 15px; }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 12px; font-weight: 500; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-desc { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-actions { display: flex; gap: 4px; }
    .p-btn { opacity: 0; background: none; border: none; color: #666; cursor: pointer; font-size: 12px; padding: 3px; transition: all 0.15s; font-family: inherit; }
    .preset-item:hover .p-btn { opacity: 1; }
    .p-btn:hover { color: #c8a97e; }
    .p-btn.del:hover { color: #e74c3c; }

    .empty { color: #555; font-size: 12px; text-align: center; padding: 20px 0; font-style: italic; }
    .empty span { display: block; margin-top: 6px; font-size: 11px; color: #444; font-style: normal; }

    /* Inline edit form */
    .edit-form { display: none; padding: 10px; margin-bottom: 4px; background: #252525; border: 1px solid #3a3a3a; border-radius: 6px; }
    .edit-form.open { display: block; }
    .ef-row { margin-bottom: 6px; }
    .ef-row label { display: block; font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 3px; }
    .ef-row input { width: 100%; padding: 5px 8px; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; color: #f0f0f0; font-size: 12px; font-family: inherit; outline: none; box-sizing: border-box; }
    .ef-row input:focus { border-color: #c8a97e; }
    .ef-emojis { display: flex; gap: 2px; flex-wrap: wrap; }
    .ef-emj { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; background: #2a2a2a; border: 2px solid transparent; border-radius: 5px; font-size: 13px; cursor: pointer; }
    .ef-emj.sel { border-color: #c8a97e; }
    .ef-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
    .ef-cancel { padding: 4px 10px; background: #333; border: 1px solid #444; border-radius: 4px; color: #ccc; font-size: 11px; cursor: pointer; font-family: inherit; }
    .ef-save { padding: 4px 10px; background: #c8a97e; border: none; border-radius: 4px; color: #1a1a1a; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; }

    /* Saved items */
    .label-group { margin-bottom: 12px; }
    .label-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .label-color { width: 8px; height: 8px; border-radius: 50%; }
    .label-name { font-size: 11px; font-weight: 600; color: #ccc; text-transform: uppercase; letter-spacing: 0.5px; }
    .label-count { font-size: 10px; color: #555; }

    .saved-item { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 4px; background: #222; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .saved-item:hover { background: #2a2a2a; }
    .si-img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #333; flex-shrink: 0; }
    .si-info { flex: 1; min-width: 0; }
    .si-title { font-size: 12px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .si-meta { font-size: 10px; color: #888; }
    .si-price { font-size: 12px; color: #c8a97e; font-weight: 600; flex-shrink: 0; }
    .si-remove { opacity: 0; background: none; border: none; color: #666; font-size: 11px; cursor: pointer; padding: 2px 4px; font-family: inherit; }
    .saved-item:hover .si-remove { opacity: 1; }
    .si-remove:hover { color: #e74c3c; }

    /* Labels management */
    .label-mgmt-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .lm-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.2); }
    .lm-emoji { font-size: 14px; }
    .lm-name { flex: 1; font-size: 12px; color: #ddd; }
    .lm-del { background: none; border: none; color: #555; font-size: 11px; cursor: pointer; font-family: inherit; }
    .lm-del:hover { color: #e74c3c; }

    .add-label-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-label-row input { flex: 1; padding: 5px 8px; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; color: #f0f0f0; font-size: 12px; font-family: inherit; outline: none; }
    .add-label-row input:focus { border-color: #c8a97e; }
    .add-label-btn { padding: 5px 10px; background: #c8a97e; border: none; border-radius: 4px; color: #1a1a1a; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }

    /* Settings toggles */
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
    .s-label { display: flex; flex-direction: column; gap: 1px; }
    .s-name { font-size: 12px; color: #ddd; }
    .s-desc { font-size: 10px; color: #666; }
    .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-sl { position: absolute; inset: 0; background: #444; border-radius: 9px; cursor: pointer; transition: background 0.2s; }
    .toggle-sl::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #999; border-radius: 50%; transition: all 0.2s; }
    .toggle input:checked + .toggle-sl { background: #c8a97e; }
    .toggle input:checked + .toggle-sl::after { left: 18px; background: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:16px">⚡</span>
    <h1>RealReal Enhancer</h1>
    <span class="v">v1.3</span>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="presets">Presets</div>
    <div class="tab" data-tab="items">My Items</div>
    <div class="tab" data-tab="settings">Settings</div>
  </div>

  <!-- Presets Tab -->
  <div class="tab-content active" id="tab-presets">
    <div class="section">
      <ul id="preset-list" style="list-style:none"></ul>
    </div>
  </div>

  <!-- My Items Tab -->
  <div class="tab-content" id="tab-items">
    <div class="section" id="items-section"></div>
  </div>

  <!-- Settings Tab -->
  <div class="tab-content" id="tab-settings">
    <div class="section">
      <div class="section-title">View</div>
      <div class="setting-row">
        <div class="s-label"><span class="s-name">Compact View</span><span class="s-desc">More items per row</span></div>
        <label class="toggle"><input type="checkbox" id="s-compact"><span class="toggle-sl"></span></label>
      </div>
      <div class="setting-row">
        <div class="s-label"><span class="s-name">Dim Sold Items</span><span class="s-desc">Fade out sold items</span></div>
        <label class="toggle"><input type="checkbox" id="s-dim"><span class="toggle-sl"></span></label>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Item Labels</div>
      <div id="labels-mgmt"></div>
      <div class="add-label-row">
        <input type="text" id="new-label-name" placeholder="New label name..." maxlength="20">
        <button class="add-label-btn" id="add-label-btn">+ Add</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
