<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RealReal Enhancer</title>
  <style>
    :root { --bg: #111; --surface: #1a1a1a; --surface2: #222; --border: #2a2a2a; --text: #f0f0f0; --text2: #aaa; --text3: #666; --gold: #c8a97e; --green: #27ae60; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; -webkit-font-smoothing: antialiased; }

    .header { padding: 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; flex: 1; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
    .status-dot.on { background: var(--green); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
    .qs { padding: 14px 8px; text-align: center; border-right: 1px solid var(--border); }
    .qs:last-child { border-right: none; }
    .qs-num { font-size: 20px; font-weight: 700; }
    .qs-num.gold { color: var(--gold); }
    .qs-num.green { color: var(--green); }
    .qs-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .actions { padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .action-btn { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; color: inherit; font-family: inherit; font-size: 13px; width: 100%; text-align: left; }
    .action-btn:hover { background: var(--surface2); border-color: var(--gold); }
    .action-icon { font-size: 18px; }
    .action-info { flex: 1; }
    .action-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .action-desc { font-size: 10px; color: var(--text3); }
    .action-arrow { color: var(--text3); font-size: 14px; }

    .presets-section { padding: 0 12px 12px; }
    .presets-title { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-top: 4px; }
    .presets-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .preset-pill { display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; font-size: 11px; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .preset-pill:hover { border-color: var(--gold); color: var(--text); }
    .no-presets { font-size: 11px; color: var(--text3); font-style: italic; padding: 4px 0; }

    .settings-strip { display: flex; padding: 10px 12px; gap: 12px; border-top: 1px solid var(--border); background: var(--surface); }
    .ss-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    .ss-toggle input { display: none; }
    .ss-slider { position: relative; width: 28px; height: 16px; background: #444; border-radius: 8px; transition: background 0.2s; }
    .ss-slider::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #999; border-radius: 50%; transition: all 0.2s; }
    .ss-toggle input:checked + .ss-slider { background: var(--gold); }
    .ss-toggle input:checked + .ss-slider::after { left: 14px; background: #fff; }
    .ss-label { font-size: 10px; color: var(--text3); }
    .ss-toggle input:checked ~ .ss-label { color: var(--gold); }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:16px">⚡</span>
    <h1>RealReal Enhancer</h1>
    <span class="status-dot" id="status-dot"></span>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="qs"><div class="qs-num gold" id="stat-items">-</div><div class="qs-label">Items</div></div>
    <div class="qs"><div class="qs-num" id="stat-drops">-</div><div class="qs-label">Drops</div></div>
    <div class="qs"><div class="qs-num" id="stat-presets">-</div><div class="qs-label">Presets</div></div>
  </div>

  <div class="actions">
    <button class="action-btn" onclick="openSidePanel()">
      <span class="action-icon">🎵</span>
      <div class="action-info"><div class="action-name">Side Panel</div><div class="action-desc">Items + music while you browse</div></div>
      <span class="action-arrow">→</span>
    </button>
    <button class="action-btn" onclick="openDashboard()">
      <span class="action-icon">📊</span>
      <div class="action-info"><div class="action-name">Dashboard</div><div class="action-desc">Full view of all your items and stats</div></div>
      <span class="action-arrow">→</span>
    </button>
  </div>

  <div class="presets-section">
    <div class="presets-title">Quick Apply Preset</div>
    <div class="presets-pills" id="presets-pills">
      <span class="no-presets">Loading...</span>
    </div>
  </div>

  <div class="settings-strip">
    <label class="ss-toggle"><input type="checkbox" id="s-compact" onchange="toggleSetting('compactView', this.checked)"><span class="ss-slider"></span><span class="ss-label">Compact</span></label>
    <label class="ss-toggle"><input type="checkbox" id="s-dim" onchange="toggleSetting('dimSold', this.checked)"><span class="ss-slider"></span><span class="ss-label">Dim Sold</span></label>
  </div>

  <script>
    // ── Button handlers (inline onclick, can't fail) ──────

    function openDashboard() {
      chrome.tabs.create({ url: chrome.runtime.getURL('dashboard.html') });
    }

    function openSidePanel() {
      chrome.tabs.query({ active: true, currentWindow: true }, function (tabs) {
        if (tabs[0] && chrome.sidePanel && chrome.sidePanel.open) {
          chrome.sidePanel.open({ tabId: tabs[0].id }).catch(function () {
            chrome.tabs.create({ url: chrome.runtime.getURL('sidepanel.html') });
          });
        } else {
          chrome.tabs.create({ url: chrome.runtime.getURL('sidepanel.html') });
        }
      });
    }

    function applyPreset(search, hash, fullUrl) {
      chrome.tabs.query({ active: true, currentWindow: true }, function (tabs) {
        if (!tabs[0]) return;
        var u = new URL(tabs[0].url);
        var noF = ['/account', '/cart', '/checkout', '/login', '/signup', '/settings', '/orders', '/help'];
        var ok = u.pathname !== '/' && !noF.some(function (p) { return u.pathname.startsWith(p); });
        var url = (ok && (search || hash)) ? u.origin + u.pathname + search + hash : fullUrl;
        chrome.tabs.update(tabs[0].id, { url: url });
        window.close();
      });
    }

    var currentSettings = {};

    function toggleSetting(key, value) {
      currentSettings[key] = value;
      chrome.storage.sync.set({ settings: currentSettings });
      chrome.runtime.sendMessage({ type: 'REFRESH_CONTENT' });
    }

    // ── Load data (safe, won't break buttons) ─────────────

    chrome.storage.sync.get(['presets', 'settings'], function (sync) {
      chrome.storage.local.get(['savedItems'], function (local) {
        var presets = (sync && sync.presets) || [];
        currentSettings = (sync && sync.settings) || {};
        var savedItems = (local && local.savedItems) || {};

        // Status
        chrome.tabs.query({ active: true, currentWindow: true }, function (tabs) {
          if (tabs[0] && tabs[0].url && tabs[0].url.indexOf('therealreal.com') !== -1) {
            document.getElementById('status-dot').className = 'status-dot on';
          }
        });

        // Stats
        var keys = Object.keys(savedItems);
        var drops = 0;
        for (var i = 0; i < keys.length; i++) {
          var item = savedItems[keys[i]];
          if (item) {
            var orig = parsePrice(item.originalPrice);
            var curr = parsePrice(item.currentPrice);
            if (orig > 0 && curr > 0 && curr < orig) drops++;
          }
        }
        document.getElementById('stat-items').textContent = keys.length;
        document.getElementById('stat-drops').textContent = drops;
        if (drops > 0) document.getElementById('stat-drops').className = 'qs-num green';
        document.getElementById('stat-presets').textContent = presets.length;

        // Presets
        var pills = document.getElementById('presets-pills');
        if (presets.length > 0) {
          var html = '';
          for (var j = 0; j < presets.length; j++) {
            var p = presets[j];
            var emoji = escHtml(p.emoji || '🔖');
            var name = escHtml(p.name);
            var search = escAttr(p.search || '');
            var hash = escAttr(p.hash || '');
            var fullUrl = escAttr(p.fullUrl || '');
            html += '<button class="preset-pill" onclick="applyPreset(\'' + search + '\', \'' + hash + '\', \'' + fullUrl + '\')">' + emoji + ' ' + name + '</button>';
          }
          pills.innerHTML = html;
        } else {
          pills.innerHTML = '<span class="no-presets">Save filters from the toolbar on TRR</span>';
        }

        // Settings
        document.getElementById('s-compact').checked = currentSettings.compactView || false;
        document.getElementById('s-dim').checked = currentSettings.dimSold !== undefined ? currentSettings.dimSold : true;
      });
    });

    function parsePrice(s) {
      if (!s) return 0;
      var m = String(s).replace(/,/g, '').match(/[\d.]+/);
      return m ? parseFloat(m[0]) : 0;
    }

    function escHtml(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function escAttr(s) {
      return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
