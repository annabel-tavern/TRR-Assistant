<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealReal Enhancer — Dashboard</title>
  <style>
    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --surface2: #222;
      --surface3: #2a2a2a;
      --border: #333;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #666;
      --gold: #c8a97e;
      --gold-light: #d4b88f;
      --gold-dim: rgba(200,169,126,0.15);
      --green: #27ae60;
      --blue: #3498db;
      --red: #e74c3c;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .app { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 24px 0; border-bottom: 1px solid var(--border);
      margin-bottom: 32px; position: sticky; top: 0;
      background: var(--bg); z-index: 100;
    }
    .header-logo { font-size: 24px; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
    .header-subtitle { font-size: 12px; color: var(--text3); margin-left: 4px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .header-btn {
      padding: 8px 16px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer;
      font-family: inherit; transition: all 0.15s; text-decoration: none;
    }
    .header-btn:hover { background: var(--surface3); border-color: var(--gold); color: var(--text); }
    .header-btn.primary { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 600; }
    .header-btn.primary:hover { background: var(--gold-light); }

    /* ── Stats ────────────────────────────────────────────── */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 36px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .stat-number { font-size: 28px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .stat-card.gold .stat-number { color: var(--gold); }

    /* ── Section ──────────────────────────────────────────── */
    .section { margin-bottom: 40px; }
    .section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .section-count {
      font-size: 11px; color: var(--text3); background: var(--surface2);
      padding: 2px 8px; border-radius: 10px;
    }
    .section-actions { margin-left: auto; display: flex; gap: 8px; }

    /* ── Presets Grid ─────────────────────────────────────── */
    .presets-grid {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .preset-card {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 24px;
      cursor: pointer; transition: all 0.2s; text-decoration: none; color: inherit;
    }
    .preset-card:hover { background: var(--surface2); border-color: var(--gold); transform: translateY(-1px); }
    .preset-emoji { font-size: 18px; }
    .preset-info { display: flex; flex-direction: column; }
    .preset-card-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .preset-card-desc { font-size: 11px; color: var(--text3); }

    /* ── Search Bar ───────────────────────────────────────── */
    .search-bar {
      position: relative; max-width: 400px;
    }
    .search-bar input {
      width: 100%; padding: 10px 16px 10px 36px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; color: var(--text); font-size: 13px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--gold); }
    .search-bar input::placeholder { color: var(--text3); }
    .search-bar::before {
      content: '🔍'; position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 13px; pointer-events: none;
    }

    /* ── Label Filter Chips ───────────────────────────────── */
    .label-filters { display: flex; flex-wrap: wrap; gap: 6px; }
    .label-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; color: var(--text2); cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .label-chip:hover { border-color: var(--text3); }
    .label-chip.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .label-chip-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Items Grid ───────────────────────────────────────── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .item-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
    }
    .item-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .item-img-wrap {
      position: relative; width: 100%; aspect-ratio: 3/4;
      background: var(--surface2); overflow: hidden;
    }
    .item-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s;
    }
    .item-card:hover .item-img { transform: scale(1.03); }
    .item-labels {
      position: absolute; top: 8px; left: 8px;
      display: flex; gap: 4px;
    }
    .item-label-badge {
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; color: #fff;
      backdrop-filter: blur(8px);
    }
    .item-details { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .item-brand { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .item-title { font-size: 13px; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .item-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 6px; }
    .item-price { font-size: 15px; font-weight: 700; color: var(--gold); }
    .item-date { font-size: 10px; color: var(--text3); }
    .item-price-original { font-size: 11px; color: var(--text3); text-decoration: line-through; margin-right: 4px; }
    .item-price-drop { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--green); font-weight: 600; background: rgba(39,174,96,0.15); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .item-price-up { color: var(--red); background: rgba(231,76,60,0.15); }
    .item-remove {
      opacity: 0; background: none; border: none; color: var(--text3);
      font-size: 14px; cursor: pointer; padding: 4px; transition: all 0.15s;
      font-family: inherit;
    }
    .item-card:hover .item-remove { opacity: 1; }
    .item-remove:hover { color: var(--red); }

    /* ── Label Group Header ───────────────────────────────── */
    .label-group { margin-bottom: 32px; }
    .label-group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .label-group-dot { width: 10px; height: 10px; border-radius: 50%; }
    .label-group-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .label-group-count { font-size: 12px; color: var(--text3); }
    .label-group-emoji { font-size: 16px; }

    /* ── Empty States ─────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .empty-desc { font-size: 13px; color: var(--text3); max-width: 360px; margin: 0 auto; }

    /* ── Labels Manager ───────────────────────────────────── */
    .labels-manager {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .label-manage-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; color: var(--text2);
    }
    .label-manage-del {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 12px; padding: 0 0 0 4px; font-family: inherit;
    }
    .label-manage-del:hover { color: var(--red); }

    .add-label-inline {
      display: flex; align-items: center; gap: 6px;
    }
    .add-label-inline input {
      padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 12px;
      font-family: inherit; outline: none; width: 150px;
    }
    .add-label-inline input:focus { border-color: var(--gold); }
    .add-label-inline button {
      padding: 8px 14px; background: var(--gold); border: none;
      border-radius: 20px; color: #111; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      text-align: center; padding: 40px 0 20px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .footer-text { font-size: 11px; color: var(--text3); }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .app { padding: 0 16px 40px; }
      .header { flex-wrap: wrap; gap: 8px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .items-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeUp 0.4s ease forwards; }
    .delay-1 { animation-delay: 0.05s; opacity: 0; }
    .delay-2 { animation-delay: 0.1s; opacity: 0; }
    .delay-3 { animation-delay: 0.15s; opacity: 0; }
    .delay-4 { animation-delay: 0.2s; opacity: 0; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <span class="header-logo">⚡</span>
      <span class="header-title">RealReal Enhancer</span>
      <span class="header-subtitle">Dashboard</span>
      <div class="header-actions">
        <a class="header-btn" href="https://www.therealreal.com" target="_blank">Open The RealReal</a>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats animate-in" id="stats-section"></div>

    <!-- Presets -->
    <div class="section animate-in delay-1" id="presets-section"></div>

    <!-- Items -->
    <div class="section animate-in delay-2" id="items-section"></div>

    <!-- Labels Manager -->
    <div class="section animate-in delay-3" id="labels-section"></div>

    <footer class="footer animate-in delay-4">
      <p class="footer-text">Built to make luxury resale shopping feel fast instead of exhausting.</p>
    </footer>
  </div>

  <script>
    // ── Data ──────────────────────────────────────────────
    let presets = [], labels = [], savedItems = {}, settings = {};

    const LABEL_COLORS = ['#27ae60','#3498db','#e74c3c','#9b59b6','#e67e22','#1abc9c','#f39c12','#e91e63'];
    const LABEL_EMOJIS = ['🛒','📌','🎁','💡','👀','🔥','💰','🏷️'];

    async function loadAll() {
      const sync = await chrome.storage.sync.get(['presets', 'settings', 'labels']);
      const local = await chrome.storage.local.get(['savedItems']);
      presets = sync.presets || [];
      settings = sync.settings || {};
      labels = sync.labels || [
        { id: 'want-to-buy', name: 'Want to Buy', emoji: '🛒', color: '#27ae60' },
        { id: 'reference', name: 'Reference', emoji: '📌', color: '#3498db' },
        { id: 'gift', name: 'For a Gift', emoji: '🎁', color: '#e74c3c' },
      ];
      savedItems = local.savedItems || {};
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function parsePrice(str) {
      if (!str) return 0;
      const match = String(str).replace(/,/g, '').match(/[\d.]+/);
      return match ? parseFloat(match[0]) : 0;
    }

    function priceChangeHTML(item) {
      if (!item.originalPrice || !item.currentPrice) return '';
      const orig = parsePrice(item.originalPrice);
      const curr = parsePrice(item.currentPrice);
      if (orig === 0 || curr === 0 || orig === curr) return '';
      const diff = orig - curr;
      const pct = Math.round((Math.abs(diff) / orig) * 100);
      if (diff > 0) {
        return `<span class="item-price-original">${esc(item.originalPrice)}</span><span class="item-price-drop">▼ ${pct}%</span>`;
      } else {
        return `<span class="item-price-drop item-price-up">▲ ${pct}%</span>`;
      }
    }

    function relativeDate(iso) {
      if (!iso) return '';
      const d = new Date(iso), now = new Date();
      const days = Math.floor((now - d) / 86400000);
      if (days === 0) return 'Today';
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days}d ago`;
      if (days < 30) return `${Math.floor(days / 7)}w ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ── Render Stats ─────────────────────────────────────
    function renderStats() {
      const itemKeys = Object.keys(savedItems);
      const totalItems = itemKeys.length;
      const totalPresets = presets.length;
      const totalLabels = labels.length;

      // Count by label + price drops
      const buyCount = itemKeys.filter(k => savedItems[k].labels?.includes('want-to-buy')).length;
      const priceDrops = itemKeys.filter(k => {
        const item = savedItems[k];
        return item.originalPrice && item.currentPrice && parsePrice(item.currentPrice) < parsePrice(item.originalPrice);
      }).length;

      document.getElementById('stats-section').innerHTML = `
        <div class="stat-card gold">
          <span class="stat-number">${totalItems}</span>
          <span class="stat-label">Saved Items</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">${buyCount}</span>
          <span class="stat-label">Want to Buy</span>
        </div>
        <div class="stat-card" style="${priceDrops ? 'border-color: var(--green)' : ''}">
          <span class="stat-number" style="${priceDrops ? 'color: var(--green)' : ''}">${priceDrops}</span>
          <span class="stat-label">Price Drops</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">${totalPresets}</span>
          <span class="stat-label">Filter Presets</span>
        </div>`;
    }

    // ── Render Presets ────────────────────────────────────
    function renderPresets() {
      const section = document.getElementById('presets-section');
      if (!presets.length) {
        section.innerHTML = `
          <div class="section-header"><span class="section-title">Filter Presets</span></div>
          <div class="empty-state">
            <div class="empty-icon">🔖</div>
            <div class="empty-title">No presets yet</div>
            <div class="empty-desc">Browse The RealReal, set up your filters, and save them from the toolbar.</div>
          </div>`;
        return;
      }

      section.innerHTML = `
        <div class="section-header">
          <span class="section-title">Filter Presets</span>
          <span class="section-count">${presets.length}</span>
        </div>
        <div class="presets-grid">
          ${presets.map(p => `
            <a class="preset-card" href="https://www.therealreal.com${p.pathname || '/shop'}${p.search || ''}${p.hash || ''}" target="_blank">
              <span class="preset-emoji">${esc(p.emoji || '🔖')}</span>
              <div class="preset-info">
                <span class="preset-card-name">${esc(p.name)}</span>
                ${p.description ? `<span class="preset-card-desc">${esc(p.description)}</span>` : ''}
              </div>
            </a>
          `).join('')}
        </div>`;
    }

    // ── Render Items ─────────────────────────────────────
    let activeFilter = 'all';
    let searchQuery = '';

    function renderItems() {
      const section = document.getElementById('items-section');
      const itemKeys = Object.keys(savedItems);

      if (!itemKeys.length) {
        section.innerHTML = `
          <div class="section-header"><span class="section-title">My Items</span></div>
          <div class="empty-state">
            <div class="empty-icon">✨</div>
            <div class="empty-title">No saved items yet</div>
            <div class="empty-desc">Hover over items on The RealReal and tap a label emoji to start saving.</div>
          </div>`;
        return;
      }

      // Build filter chips
      const chipAll = `<button class="label-chip${activeFilter === 'all' ? ' active' : ''}" data-filter="all">All (${itemKeys.length})</button>`;
      const chips = labels.map(l => {
        const count = itemKeys.filter(k => savedItems[k].labels?.includes(l.id)).length;
        if (!count) return '';
        return `<button class="label-chip${activeFilter === l.id ? ' active' : ''}" data-filter="${l.id}">
          <span class="label-chip-dot" style="background:${l.color}"></span>
          ${esc(l.emoji)} ${esc(l.name)} (${count})
        </button>`;
      }).join('');

      // Filter items
      let filteredKeys = itemKeys;
      if (activeFilter !== 'all') {
        filteredKeys = itemKeys.filter(k => savedItems[k].labels?.includes(activeFilter));
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filteredKeys = filteredKeys.filter(k => {
          const item = savedItems[k];
          return (item.title || '').toLowerCase().includes(q) ||
                 (item.brand || '').toLowerCase().includes(q) ||
                 (item.price || '').toLowerCase().includes(q);
        });
      }

      // Group by label
      let itemsHTML = '';
      if (activeFilter === 'all') {
        // Group by label
        labels.forEach(l => {
          const groupKeys = filteredKeys.filter(k => savedItems[k].labels?.includes(l.id));
          if (!groupKeys.length) return;
          itemsHTML += `
            <div class="label-group">
              <div class="label-group-header">
                <span class="label-group-dot" style="background:${l.color}"></span>
                <span class="label-group-emoji">${l.emoji}</span>
                <span class="label-group-name">${esc(l.name)}</span>
                <span class="label-group-count">${groupKeys.length} item${groupKeys.length !== 1 ? 's' : ''}</span>
              </div>
              <div class="items-grid">${groupKeys.map(k => renderItemCard(k, l)).join('')}</div>
            </div>`;
        });
      } else {
        const l = labels.find(x => x.id === activeFilter);
        itemsHTML = `<div class="items-grid">${filteredKeys.map(k => renderItemCard(k, l)).join('')}</div>`;
      }

      if (!itemsHTML) {
        itemsHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No matches</div><div class="empty-desc">Try a different filter or search term.</div></div>`;
      }

      section.innerHTML = `
        <div class="section-header">
          <span class="section-title">My Items</span>
          <span class="section-count">${filteredKeys.length}</span>
          <div class="section-actions">
            <div class="search-bar">
              <input type="text" id="search-input" placeholder="Search items..." value="${esc(searchQuery)}">
            </div>
          </div>
        </div>
        <div class="label-filters" style="margin-bottom:20px">
          ${chipAll}${chips}
        </div>
        ${itemsHTML}`;

      // Events
      section.querySelectorAll('.label-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          activeFilter = chip.dataset.filter;
          renderItems();
        });
      });

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          searchQuery = e.target.value;
          renderItems();
        });
        // Re-focus after re-render
        if (searchQuery) {
          searchInput.focus();
          searchInput.setSelectionRange(searchQuery.length, searchQuery.length);
        }
      }

      section.querySelectorAll('.item-remove').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          e.stopPropagation();
          const key = btn.dataset.key;
          const labelId = btn.dataset.label;
          if (savedItems[key]) {
            if (labelId) {
              savedItems[key].labels = savedItems[key].labels.filter(l => l !== labelId);
              if (!savedItems[key].labels.length) delete savedItems[key];
            } else {
              delete savedItems[key];
            }
            await chrome.storage.local.set({ savedItems });
            renderStats();
            renderItems();
          }
        });
      });
    }

    function renderItemCard(key, label) {
      const item = savedItems[key];
      if (!item) return '';

      const labelBadges = (item.labels || []).map(lid => {
        const l = labels.find(x => x.id === lid);
        if (!l) return '';
        return `<span class="item-label-badge" style="background:${l.color}aa">${l.emoji}</span>`;
      }).join('');

      return `
        <a class="item-card" href="${esc(item.url)}" target="_blank">
          <div class="item-img-wrap">
            ${item.imageUrl ? `<img class="item-img" src="${esc(item.imageUrl)}" alt="${esc(item.title)}" loading="lazy">` : ''}
            <div class="item-labels">${labelBadges}</div>
          </div>
          <div class="item-details">
            ${item.brand ? `<span class="item-brand">${esc(item.brand)}</span>` : ''}
            <span class="item-title">${esc(item.title)}</span>
            <div class="item-bottom">
              <span class="item-price">${esc(item.currentPrice || item.price)}</span>${priceChangeHTML(item)}
              <span class="item-date">${relativeDate(item.savedAt)}</span>
              <button class="item-remove" data-key="${esc(key)}" data-label="${label ? esc(label.id) : ''}" title="Remove">✕</button>
            </div>
          </div>
        </a>`;
    }

    // ── Render Labels Manager ────────────────────────────
    function renderLabels() {
      const section = document.getElementById('labels-section');
      section.innerHTML = `
        <div class="section-header">
          <span class="section-title">Manage Labels</span>
        </div>
        <div class="labels-manager">
          ${labels.map((l, i) => `
            <div class="label-manage-chip">
              <span class="label-chip-dot" style="background:${l.color}"></span>
              ${l.emoji} ${esc(l.name)}
              <button class="label-manage-del" data-idx="${i}" title="Delete label">✕</button>
            </div>
          `).join('')}
          <div class="add-label-inline">
            <input type="text" id="new-label-input" placeholder="New label..." maxlength="20">
            <button id="add-label-btn">+ Add</button>
          </div>
        </div>`;

      section.querySelectorAll('.label-manage-del').forEach(btn => {
        btn.addEventListener('click', async () => {
          const idx = parseInt(btn.dataset.idx);
          const labelId = labels[idx].id;
          labels.splice(idx, 1);
          Object.keys(savedItems).forEach(k => {
            if (savedItems[k].labels) {
              savedItems[k].labels = savedItems[k].labels.filter(l => l !== labelId);
              if (!savedItems[k].labels.length) delete savedItems[k];
            }
          });
          await chrome.storage.sync.set({ labels });
          await chrome.storage.local.set({ savedItems });
          renderLabels(); renderItems(); renderStats();
        });
      });

      document.getElementById('add-label-btn').addEventListener('click', addLabel);
      document.getElementById('new-label-input').addEventListener('keydown', e => { if (e.key === 'Enter') addLabel(); });
    }

    async function addLabel() {
      const input = document.getElementById('new-label-input');
      const name = input.value.trim();
      if (!name) return;
      labels.push({
        id: 'custom-' + Date.now(),
        name,
        emoji: LABEL_EMOJIS[labels.length % LABEL_EMOJIS.length],
        color: LABEL_COLORS[labels.length % LABEL_COLORS.length],
      });
      await chrome.storage.sync.set({ labels });
      input.value = '';
      renderLabels(); renderItems();
    }

    // ── Init ─────────────────────────────────────────────
    async function init() {
      await loadAll();
      renderStats();
      renderPresets();
      renderItems();
      renderLabels();
    }

    init();
  </script>
</body>
</html>
